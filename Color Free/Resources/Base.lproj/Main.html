<!doctype html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />

    <link rel="stylesheet" href="../Style.css" />
    <script src="../Script.js" defer></script>
  </head>
  <body>
    <img src="../Icon.png" width="128" height="128" alt="Color Free Icon" />
    <p class="state-unknown" data-i18n="stateUnknown">
      You can turn on Color Free’s extension in Safari Extensions preferences.
    </p>
    <p class="state-on" data-i18n="stateOnPreferences">
      Color Free’s extension is currently on. You can turn it off in Safari
      Extensions preferences.
    </p>
    <p class="state-off" data-i18n="stateOffPreferences">
      Color Free’s extension is currently off. You can turn it on in Safari
      Extensions preferences.
    </p>
    <button class="open-preferences" data-i18n="openPreferences">
      Quit and Open Safari Extensions Preferences…
    </button>
  </body>
</html>
